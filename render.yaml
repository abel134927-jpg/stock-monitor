services:
  - type: web
    name: stock-monitor
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: CACHE_TTL
        value: "1800"
